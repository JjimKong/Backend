# EC2 호스트(~/app/docker-compose.yml)에 배치해서 사용한다.
# 실제 설정값은 같은 디렉터리의 .env 파일(커밋 금지)에서 주입된다.
services:
  app:
    image: ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
    container_name: jjimkong-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: jjimkong-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data

  # MySQL은 컨테이너로 띄우지 않는다. AWS RDS(외부 관리형)를 사용하며
  # 접속 정보는 .env 의 SPRING_DATASOURCE_* 로 주입한다.

volumes:
  redis-data:
