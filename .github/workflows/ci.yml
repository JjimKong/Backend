name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 주의: /src/main/resources 는 .gitignore 되어 CI 체크아웃에 없다.
      # 테스트가 통과하려면 src/test/resources/application.yml(시크릿 없는 테스트 설정)이 필요하다.
      - name: Build & Test
        run: ./gradlew build --no-daemon
