name: Deploy to EC2

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # 수동 배포 트리거

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push image to ECR
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$ECR_REPOSITORY:latest .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$ECR_REPOSITORY:latest

      # 배포 동안에만 현재 러너의 공인 IP에 대해 EC2의 22번(SSH)을 임시로 연다.
      # 평소엔 보안그룹에 이 규칙이 없으므로 SSH 포트를 상시 개방하지 않는다.
      - name: Open SSH for runner IP
        id: openssh
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "ip=$RUNNER_IP" >> "$GITHUB_OUTPUT"
          aws ec2 authorize-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp --port 22 --cidr "$RUNNER_IP/32"

      # EC2에 접속해 최신 이미지를 pull 하고 컨테이너를 재기동한다.
      # 사전 준비: EC2에 docker/docker compose 설치, ECR pull 권한(인스턴스 IAM 역할),
      #           ~/app/docker-compose.yml 과 ~/app/.env 배치.
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ steps.login-ecr.outputs.registry }}
            cd ~/app
            docker compose pull
            docker compose up -d
            docker image prune -f

      # 성공/실패와 무관하게(always) 임시로 열었던 22번 규칙을 반드시 회수한다.
      - name: Close SSH for runner IP
        if: always() && steps.openssh.outputs.ip != ''
        run: |
          aws ec2 revoke-security-group-ingress \
            --group-id ${{ secrets.EC2_SECURITY_GROUP_ID }} \
            --protocol tcp --port 22 --cidr "${{ steps.openssh.outputs.ip }}/32"
